<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" fill="none" role="img" aria-label="WagerWire logo">
  <defs>
    <linearGradient id="wwGold" x1="14" y1="5" x2="50" y2="60" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#e6b34a"/>
      <stop offset=".52" stop-color="#c8922a"/>
      <stop offset="1" stop-color="#9c6f1c"/>
    </linearGradient>
    <linearGradient id="wwSheen" x1="24" y1="4" x2="34" y2="34" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fff" stop-opacity=".5"/>
      <stop offset="1" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- coin / wax-seal hexagon -->
  <path d="M32 3.5 56.68 17.75 56.68 46.25 32 60.5 7.32 46.25 7.32 17.75 Z"
        fill="url(#wwGold)" stroke="#845b15" stroke-width="1.6" stroke-linejoin="round"/>

  <!-- inner engraved rim -->
  <path d="M32 11 50.19 21.5 50.19 42.5 32 53 13.81 42.5 13.81 21.5 Z"
        fill="none" stroke="#f7f0de" stroke-opacity=".35" stroke-width="1.4" stroke-linejoin="round"/>

  <!-- top sheen -->
  <path d="M32 3.5 56.68 17.75 32 32 7.32 17.75 Z" fill="url(#wwSheen)"/>

  <!-- "W" drawn as a wire -->
  <path d="M17 23 24 43 32 31 40 43 47 23"
        fill="none" stroke="#2c1e0f" stroke-width="5.4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- wire connection nodes (P2P endpoints) -->
  <circle cx="17" cy="23" r="4.2" fill="#2c1e0f"/>
  <circle cx="17" cy="23" r="1.7" fill="#f7f0de"/>
  <circle cx="47" cy="23" r="4.2" fill="#2c1e0f"/>
  <circle cx="47" cy="23" r="1.7" fill="#f7f0de"/>
</svg>
